<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MENSURATOR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a100a;
            color: #d4c3a3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M10,50 Q25,25 50,50 T90,50" fill="none" stroke="%23b8860b" stroke-width="2" opacity="0.3"/><circle cx="50" cy="50" r="3" fill="%23b8860b" opacity="0.4"/></svg>');
        }
        
        #gameWrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
        
        #canvasContainer {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 2 / 1;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            background-color: #eeddbb;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.15"/></svg>');
            box-shadow: inset 0 0 40px rgba(92,64,51,0.6), 0 0 40px rgba(0,0,0,1);
            border: 4px solid #5c4033;
            border-radius: 8px;
            transition: filter 0.1s;
            display: block;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .bullet-time { filter: sepia(0.6) brightness(1.1) contrast(1.2); }
        .alla-breve { filter: saturate(1.5) hue-rotate(-15deg); }
        
        .html-btn {
            background: rgba(184, 134, 11, 0.2);
            color: #b8860b;
            border: 2px solid #b8860b;
            padding: 8px 12px;
            font-family: inherit; font-size: 14px; font-weight: bold;
            border-radius: 10px; cursor: pointer; backdrop-filter: blur(4px);
        }
        .html-btn:active { background: rgba(184, 134, 11, 0.6); color: #fff; }
        #fsBtn { position: absolute; top: 10px; left: 10px; z-index: 20; }
        
        /* Draggable Shoot Button */
        #tShootDraggable {
            position: absolute;
            right: 15%;
            top: 35%;
            width: 65px; height: 65px;
            border-radius: 50%;
            background: rgba(26, 16, 10, 0.15); 
            border: 2px solid rgba(184, 134, 11, 0.3);
            color: rgba(238, 221, 187, 0.6);
            font-size: 28px; font-weight: bold;
            display: none; justify-content: center; align-items: center;
            user-select: none; -webkit-user-select: none;
            backdrop-filter: blur(2px);
            z-index: 35;
        }
        #tShootDraggable:active { background: rgba(184, 134, 11, 0.5); color: #fff; }
        
        #tPause { position: fixed; top: 10px; right: 10px; width: 45px; height: 45px; font-size: 16px; border-radius: 50%; background: rgba(26,16,10,0.3); border: 2px solid rgba(184,134,11,0.3); color: #d4c3a3; display: none; justify-content:center; align-items:center; z-index: 35; }

        @media (orientation: portrait) {
            body { justify-content: flex-start; }
            #gameWrapper { flex-direction: column; justify-content: flex-start; height: 100%; }
            #canvasContainer { flex-shrink: 0; margin-top: 10px; }
        }

        #titleDevBtn {
            position: fixed;
            bottom: 12px;
            left: 12px;
            z-index: 25;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            color: #b8860b;
            background: rgba(26, 16, 10, 0.85);
            border: 2px solid rgba(184, 134, 11, 0.5);
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #titleDevBtn:active { background: rgba(184, 134, 11, 0.35); color: #f4ecd8; }
        .dev-stage-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 420px; margin: 16px auto; }
        .dev-stage-btn { flex: 0 0 auto; min-width: 72px; padding: 8px 6px; font-family: inherit; font-size: 14px; font-weight: bold; border-radius: 12px; border: 2px solid #b8860b; background: rgba(184, 134, 11, 0.2); color: #f4ecd8; cursor: pointer; }
        .dev-stage-btn:active { background: #b8860b; color: #1a100a; }
        .dev-boss-btn { margin-top: 8px; background: rgba(139, 0, 0, 0.35); border-color: #8b0000; color: #f4ecd8; }

        /* Unified Pause/Options Menu */
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 30; justify-content: center; align-items: center; flex-direction: column; }
        .menu-box { background: rgba(26, 16, 10, 0.95); padding: 30px 40px; border: 4px solid #b8860b; border-radius: 16px; text-align: center; pointer-events: auto; max-width: 90%; }
        .menu-box h2 { margin-top: 0; color: #f4ecd8; font-size: 32px; }
        .slider-container { margin: 15px 0; font-size: 14px; color: #d4c3a3; }
        .slider-container label { display: block; margin-bottom: 5px; }
        .slider-value { display: inline-block; min-width: 60px; text-align: right; color: #b8860b; font-weight: bold; }
        .slider-container input { vertical-align: middle; cursor: pointer; width: 100%; margin-top: 8px; }
        .menu-btn { background: #b8860b; color: #1a100a; border: none; padding: 10px 20px; font-family: inherit; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; margin: 10px 5px; }
        .menu-btn:active { background: #d4c3a3; }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="canvasContainer">
        <button id="fsBtn" class="html-btn">⛶</button>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="tPause">II</div>
    </div>
</div>

<div id="touchZonesOverlay" style="display:none; pointer-events:none; position:fixed; left:0; top:0; width:100vw; height:0; z-index:4;">
    <div style="position:absolute; left:0; top:0; width:25%; height:100%; border-right: 1px solid rgba(184,134,11,0.2); display:flex; align-items:center; justify-content:center; color:rgba(184,134,11,0.3); font-size:24px;">◄</div>
    <div style="position:absolute; left:25%; top:0; width:25%; height:100%; border-right: 1px solid rgba(184,134,11,0.2); display:flex; align-items:center; justify-content:center; color:rgba(184,134,11,0.3); font-size:24px;">►</div>
    <div style="position:absolute; left:50%; top:0; width:50%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(184,134,11,0.3); font-size:24px;">▲ JUMP</div>
</div>

<div id="tShootDraggable">●</div>

<button type="button" id="titleDevBtn" aria-label="Developer mode">DEV</button>

<div id="devOverlay" class="overlay" style="z-index: 40;">
    <div class="menu-box" style="max-width: 95%;">
        <h2>Modus Formatoris</h2>
        <p style="color:#d4c3a3; font-size:15px; margin:0 0 8px;">Stadium (I–VIII) vel pugna cum Diabolo in Musica.</p>
        <div class="dev-stage-grid" id="devStageGrid"></div>
        <button type="button" class="menu-btn dev-boss-btn" id="devBossBtn">Pugna: MI-FA (Boss)</button>
        <br>
        <button type="button" class="menu-btn" id="devLeaderboardBtn">Test: Nomen in Tabella</button>
        <br>
        <button type="button" class="menu-btn" id="devResetLeaderboardBtn" style="background: rgba(220, 53, 69, 0.2); border-color: #dc3545;">Reset Leaderboard</button>
        <br>
        <button type="button" class="menu-btn" id="devCloseBtn">Claudere</button>
    </div>
</div>

<div id="pauseOverlay" class="overlay">
    <div class="menu-box" style="max-width: 500px; max-height: 85vh; overflow-y: auto;">
        <h2>PAUSATUM</h2>
        <div class="slider-container">
            <label>Mensura (Game Speed): <br><span id="speedLabel" style="font-weight:bold; color:#b8860b;">Tempus perfectum prolatio minor</span><br>
            <input type="range" id="speedSlider" min="0" max="4" step="1" value="2" oninput="updateSpeedLabel()"></label>
        </div>
        <div class="slider-container">
            <label>Musica Vol: <span class="slider-value" id="musicVolValue">0.8</span><input type="range" id="musicVol" min="0" max="1" step="0.05" value="0.8" oninput="updateSliderValue('musicVolValue', this.value)"></label>
        </div>
        <div class="slider-container">
            <label>Effectus Vol: <span class="slider-value" id="fxVolValue">0.4</span><input type="range" id="fxVol" min="0" max="1" step="0.05" value="0.4" oninput="updateSliderValue('fxVolValue', this.value)"></label>
        </div>
        <div id="devPhysicsSection" style="display: none;">
            <hr style="border-color: rgba(184,134,11,0.3); margin: 15px 0;">
            <div style="text-align: center; color: #b8860b; font-weight: bold; margin-bottom: 10px; font-size: 14px;">⚙ DEV MODE: Physics Tweaker</div>
            <div class="slider-container">
                <label>Gravitas: <span class="slider-value" id="gravityValue">0.6</span><input type="range" id="gravitySlider" min="0.2" max="1.0" step="0.1" value="0.6" oninput="updateSliderValue('gravityValue', this.value)"></label>
            </div>
            <div class="slider-container">
                <label>Saltus Altitudo (Jump Height): <span class="slider-value" id="jumpPowerValue">9</span><input type="range" id="jumpPowerSlider" min="5" max="13" step="1" value="9" oninput="updateSliderValue('jumpPowerValue', this.value)"></label>
            </div>
            <div class="slider-container">
                <label>Celeritas Pedestris (Walk Speed): <span class="slider-value" id="walkSpeedValue">6.5</span><input type="range" id="walkSpeedSlider" min="3" max="10" step="0.5" value="6.5" oninput="updateSliderValue('walkSpeedValue', this.value)"></label>
            </div>
            <div class="slider-container">
                <label>Cursus Velocitas (Sprint Speed): <span class="slider-value" id="sprintSpeedValue">12</span><input type="range" id="sprintSpeedSlider" min="8" max="16" step="1" value="12" oninput="updateSliderValue('sprintSpeedValue', this.value)"></label>
            </div>
        </div>
        <button class="menu-btn" onclick="togglePause()" style="width: 100%; margin-top: 15px;">Resume</button>
        <button class="menu-btn" onclick="quitToMenu()" style="width: 100%; background: rgba(139, 0, 0, 0.5);">Quit to Title</button>
    </div>
</div>

<script>
    document.getElementById('fsBtn').addEventListener('click', () => {
        let elem = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
    });

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const pauseOverlay = document.getElementById('pauseOverlay');
    const touchZonesOverlay = document.getElementById('touchZonesOverlay');
    const shootBtn = document.getElementById('tShootDraggable');
    const tPause = document.getElementById('tPause');
    const canvasContainer = document.getElementById('canvasContainer');
    const titleDevBtn = document.getElementById('titleDevBtn');
    const devOverlay = document.getElementById('devOverlay');
    const devStageGrid = document.getElementById('devStageGrid');
    const devBossBtn = document.getElementById('devBossBtn');
    const devCloseBtn = document.getElementById('devCloseBtn');

    for (let i = 0; i < 8; i++) {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'dev-stage-btn';
        b.textContent = 'Modus ' + (i + 1);
        b.addEventListener('click', () => devPickStage(i));
        devStageGrid.appendChild(b);
    }
    devBossBtn.addEventListener('click', () => devPickBoss());
    const devLeaderboardBtn = document.getElementById('devLeaderboardBtn');
    devLeaderboardBtn.addEventListener('click', () => devTestLeaderboard());
    const devResetLeaderboardBtn = document.getElementById('devResetLeaderboardBtn');
    devResetLeaderboardBtn.addEventListener('click', () => devResetLeaderboard());
    devCloseBtn.addEventListener('click', () => closeDevPanel());
    
    titleDevBtn.addEventListener('click', () => { 
        if (gameState === 'MENU') {
            if (devOverlay.style.display === 'flex') {
                closeDevPanel();
            } else {
                if (isDevUnlocked) {
                    openDevPanel();
                } else {
                    const pwd = prompt("Introduce tesseram (Enter Password):");
                    if (pwd === "67") {
                        isDevUnlocked = true;
                        document.getElementById('devPhysicsSection').style.display = 'block';
                        openDevPanel();
                    } else if (pwd !== null) {
                        alert("Accessus interdictus! (Access Denied)");
                    }
                }
            }
        }
    });
    function openDevPanel() { devOverlay.style.display = 'flex'; }
    function closeDevPanel() { devOverlay.style.display = 'none'; }
    function devPickStage(n) {
        gameMode = 'CLASSIC';
        currentLevel = n;
        closeDevPanel();
        startGame();
    }
    function devPickBoss() {
        gameMode = 'CLASSIC';
        currentLevel = 7;
        window.skipToBoss = true; // Tell startGame to teleport the player
        closeDevPanel();
        startGame();
    }
    function devTestLeaderboard() {
        player.score = Math.floor(Math.random() * 500) + 100;
        levelTime = Math.floor(Math.random() * 300) + 120;
        inputName = '';
        if (!currentLevelData) { currentLevelData = { hasFuga: false, goal: { x: 100 } }; }
        gameState = 'NAME_INPUT';
        closeDevPanel();
    }
    
    function devResetLeaderboard() {
        if (confirm(`Are you sure you want to reset the ${currentLeaderboardMode} leaderboard? This will delete all entries!`)) {
            leaderboard = [];
            const codes = getDreamloCodes(currentLeaderboardMode);
            const targetUrl = `http://dreamlo.com/lb/${codes.priv}/clear`;
            const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;
            
            fetch(proxyUrl)
            .then(response => {
                if (response.ok) {
                    alert(`${currentLeaderboardMode} Leaderboard has been reset.`);
                    loadLeaderboard();
                } else { alert('Failed to reset leaderboard.'); }
            })
            .catch(error => { alert('Error resetting leaderboard.'); });
        }
    }
    
    const musicVolSlider = document.getElementById('musicVol');
    const fxVolSlider = document.getElementById('fxVol');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const decaySlider = document.getElementById('decaySlider');
let isDevUnlocked = false;
    // Dev Mode Physics Sliders
    const gravitySlider = document.getElementById('gravitySlider');
    const jumpPowerSlider = document.getElementById('jumpPowerSlider');
    const walkSpeedSlider = document.getElementById('walkSpeedSlider');
    const sprintSpeedSlider = document.getElementById('sprintSpeedSlider');

    let audioCtx; let musicTimeout; let melodyIndex = 0; let audioUnlocked = false; let isMuted = false;
    let isTouchDevice = false;

    // --- Difficulty / Global Speed Settings ---
    const speedSettings = [
        { name: "Modus cum tempore", mult: 0.8 }, 
        { name: "Tempus perfectum prolatio major", mult: 0.9 }, 
        { name: "Tempus perfectum prolatio minor", mult: 1.0 }, // Default
        { name: "Tempus imperfectum prolatio major", mult: 1.1 },
        { name: "Tempus imperfectum prolatio minor", mult: 1.2 } 
    ];
    let difficultyIndex = 2; 

    function updateSpeedLabel() {
        difficultyIndex = parseInt(speedSlider.value);
        speedLabel.innerText = speedSettings[difficultyIndex].name;
    }

    function updateSliderValue(elementId, value) {
        document.getElementById(elementId).textContent = value;
    }

    // --- Global Leaderboard System ---
    let leaderboard = [];
    let inputName = '';
    let showNameInput = false;

    const DREAMLO_PUBLIC_CLASSIC = '69c672f28f40bc2f6084f817';
    const DREAMLO_PRIVATE_CLASSIC = '_VKanEz7lkSQ2iLJrCvVrgTthj6suPakGd3nNlMedDUA';

    const DREAMLO_PUBLIC_ENDLESS = '69c69bd88f40bc2f6086c41f';
    const DREAMLO_PRIVATE_ENDLESS = 'jvDcnsBwJk6fya1GUA8-yQ_PSo9L5Oj0mj9WB6QeIvTQ';

    const PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=';
    let currentLeaderboardMode = 'CLASSIC'; 

    function getDreamloCodes(mode) {
        if (mode === 'ENDLESS') return { pub: DREAMLO_PUBLIC_ENDLESS, priv: DREAMLO_PRIVATE_ENDLESS };
        return { pub: DREAMLO_PUBLIC_CLASSIC, priv: DREAMLO_PRIVATE_CLASSIC };
    }

    async function loadLeaderboard() {
        try {
            const codes = getDreamloCodes(currentLeaderboardMode);
            const targetUrl = `http://dreamlo.com/lb/${codes.pub}/json`;
            const proxyUrl = `${PROXY_URL}${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);

            if (response.ok) {
                const data = await response.json();
                leaderboard = [];
                if (data.dreamlo && data.dreamlo.leaderboard && data.dreamlo.leaderboard.entry) {
                    const entries = Array.isArray(data.dreamlo.leaderboard.entry) 
                        ? data.dreamlo.leaderboard.entry 
                        : [data.dreamlo.leaderboard.entry];
                    
                    entries.forEach(entry => {
                        leaderboard.push({
                            name: entry.name,
                            score: parseInt(entry.score),
                            time: entry.seconds ? parseInt(entry.seconds) : 0
                        });
                    });
                }
            }
        } catch (error) { console.log('Failed to load from Dreamlo:', error); }
        
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 10);
    }

    async function addToLeaderboard(name, score, time) {
        if (!name || name.trim() === "") return;
        const cleanName = name.trim().replace(/[^a-zA-Z0-9]/g, "");

        try {
            const codes = getDreamloCodes(gameMode);
            const targetUrl = `http://dreamlo.com/lb/${codes.priv}/add/${encodeURIComponent(cleanName)}/${score}/${Math.floor(time)}`;
            const proxyUrl = `${PROXY_URL}${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (response.ok) {
                setTimeout(() => {
                    loadLeaderboard();
                }, 500);
            }
        } catch (error) { console.log('Failed to add to Dreamlo:', error); }
    }

    // --- // --- Name Input Screen ---
    function drawNameInput() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        
        ctx.fillStyle = '#f4ecd8'; ctx.font = 'bold 32px "Book Antiqua", serif';
        ctx.fillText(gameMode === 'ENDLESS' ? 'CANTUS FINITUS' : 'VICTORIA!', canvas.width / 2, 100);
        
        ctx.fillStyle = '#d4c3a3'; ctx.font = '20px "Book Antiqua", serif';
        ctx.fillText('Tempus: ' + Math.floor(levelTime / 60) + ':' + Math.floor(levelTime % 60).toString().padStart(2, '0'), canvas.width / 2, 140);
        ctx.fillText('Puncta: ' + player.score, canvas.width / 2, 170);
        if (gameMode === 'ENDLESS') ctx.fillText('Spatium: ' + endlessDistance, canvas.width / 2, 200);
        
        ctx.fillStyle = '#b8860b'; ctx.font = '18px "Book Antiqua", serif';
        ctx.fillText('Inscribe nomen tuum:', canvas.width / 2, 240);
        
        ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2;
        ctx.strokeRect(canvas.width / 2 - 100, 270, 200, 30);
        ctx.fillStyle = inputName ? '#d4c3a3' : '#1a100a';
        ctx.fillRect(canvas.width / 2 - 98, 272, 196, 26);
        
        ctx.fillStyle = '#000'; ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        const cursor = Math.floor(Date.now() / 500) % 2 ? '_' : '';
        ctx.fillText(inputName + cursor, canvas.width / 2, 290);
        
        ctx.fillStyle = '#b8860b'; ctx.font = 'italic 14px "Book Antiqua", serif';
        ctx.fillText('Press ENTER to save, ESC to skip', canvas.width / 2, 340);
    }

    // --- Leaderboard Display Screen ---
    function drawLeaderboard() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw Switch Button
        const switchBtnW = 160;
        const switchBtnH = 30;
        const switchBtnX = 10;
        const switchBtnY = 10;
        
        ctx.fillStyle = 'rgba(184, 134, 11, 0.3)';
        ctx.fillRect(switchBtnX, switchBtnY, switchBtnW, switchBtnH);
        ctx.strokeStyle = '#b8860b';
        ctx.lineWidth = 2;
        ctx.strokeRect(switchBtnX, switchBtnY, switchBtnW, switchBtnH);
        
        ctx.fillStyle = '#d4c3a3';
        ctx.font = '16px "Book Antiqua", serif';
        ctx.textAlign = 'center';
        ctx.fillText(currentLeaderboardMode === 'CLASSIC' ? 'Switch to Endless' : 'Switch to Classic', switchBtnX + switchBtnW / 2, switchBtnY + 21);

        // Draw close button
        const closeBtnSize = 30;
        const closeBtnX = canvas.width - closeBtnSize - 10;
        const closeBtnY = 10;
        
        ctx.fillStyle = 'rgba(184, 134, 11, 0.3)';
        ctx.fillRect(closeBtnX, closeBtnY, closeBtnSize, closeBtnSize);
        ctx.strokeStyle = '#b8860b';
        ctx.lineWidth = 2;
        ctx.strokeRect(closeBtnX, closeBtnY, closeBtnSize, closeBtnSize);
        ctx.strokeStyle = '#d4c3a3';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(closeBtnX + 8, closeBtnY + 8);
        ctx.lineTo(closeBtnX + closeBtnSize - 8, closeBtnY + closeBtnSize - 8);
        ctx.moveTo(closeBtnX + closeBtnSize - 8, closeBtnY + 8);
        ctx.lineTo(closeBtnX + 8, closeBtnY + closeBtnSize - 8);
        ctx.stroke();
        
        ctx.textAlign = 'center';
        ctx.fillStyle = '#f4ecd8';
        ctx.font = 'bold 32px "Book Antiqua", serif';
        ctx.fillText('MAGISTRI MENSURATORUM', canvas.width / 2, 60);
        
        ctx.fillStyle = '#d4c3a3';
        ctx.font = '20px "Book Antiqua", serif';
        ctx.fillText(`Top 10 Champions (${currentLeaderboardMode})`, canvas.width / 2, 100);
        
        ctx.textAlign = 'left';
        ctx.font = '16px "Book Antiqua", serif';
        let y = 140;
        
        if (leaderboard.length === 0) {
            ctx.fillStyle = '#d4c3a3';
            ctx.fillText('No champions yet. Be the first!', canvas.width / 2 - 100, y);
        } else {
            leaderboard.forEach((entry, i) => {
                if (i === 0) ctx.fillStyle = '#ffd700';
                else if (i === 1) ctx.fillStyle = '#c0c0c0';
                else if (i === 2) ctx.fillStyle = '#cd7f32';
                else ctx.fillStyle = '#d4c3a3';
                
                const rank = (i + 1).toString().padStart(2, '.') + ' ';

    function unlockAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        if (!audioUnlocked) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); gain.gain.value = 0;

    function playNextNote(modeIndex) {
        if (gameState === 'PAUSE' || gameState !== 'PLAY' || musicVolSlider.value == 0) {
            if (musicVolSlider.value > 0 && (gameState === 'PLAY' || gameState === 'PAUSE')) musicTimeout = setTimeout(() => playNextNote(modeIndex), 100);
            return;
        }

        const mode = modesData[modeIndex];
        const seqIndex = melodyIndex % lHommeArme.length; 
        const targetFreq = diatonic[mode.finalIndex + lHommeArme[seqIndex]];
        
        let timeMultiplier = 1.0;
        if (player.tempusTimer > 0) timeMultiplier = 1.5;
        if (player.allaBreveTimer > 0) timeMultiplier = 0.75; 
        if (player.colorationTimer > 0) timeMultiplier *= 0.6;
        
        const duration = (rhythm[seqIndex % rhythm.length] * timeMultiplier) / speedSettings[difficultyIndex].mult;
        const now = audioCtx.currentTime; const mVol = parseFloat(musicVolSlider.value);
        
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        osc.type = (boss.active) ? 'sawtooth' : (player.colorationTimer > 0 ? 'square' : 'sine'); 
        osc.frequency.value = targetFreq;
        let targetGain = 0.06 * mVol; if (player.colorationTimer > 0) targetGain *= 0.3; 

        gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(targetGain, now + 0.05); gain.gain.linearRampToValueAtTime(0, now + duration - 0.05);
        osc.start(now); osc.stop(now + duration);
        
        if (currentLevelData && currentLevelData.hasFuga && !boss.active) {
            const ghostNow = now + (1.0 / speedSettings[difficultyIndex].mult); 
            const oscGhost = audioCtx.createOscillator(); const gainGhost = audioCtx.createGain();
            oscGhost.connect(gainGhost); gainGhost.connect(audioCtx.destination);
            oscGhost.type = 'triangle'; oscGhost.frequency.value = targetFreq * 2; 
            gainGhost.gain.setValueAtTime(0, ghostNow); gainGhost.gain.linearRampToValueAtTime(0.02 * mVol, ghostNow + 0.05); gainGhost.gain.linearRampToValueAtTime(0, ghostNow + duration - 0.05);
            oscGhost.start(ghostNow); oscGhost.stop(ghostNow + duration);
        }
        melodyIndex++; musicTimeout = setTimeout(() => playNextNote(modeIndex), duration * 1000 + 10);
    }

    function playSound(type) {
        if (!audioCtx || audioCtx.state === 'suspended' || fxVolSlider.value == 0) return;
        const now = audioCtx.currentTime; const fVol = parseFloat(fxVolSlider.value);
        const smFx = Math.max(0.5, speedSettings[difficultyIndex].mult);
        const fxT = (sec) => Math.max(0.015, sec / smFx);

            vibrate(40);
            const d = fxT(0.4);
            const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
            const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
            osc1.connect(gain1); gain1.connect(audioCtx.destination); osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
            osc1.frequency.setValueAtTime(65.41, now); osc2.frequency.setValueAtTime(92.50, now); 
            gain1.gain.setValueAtTime(0.2 * fVol, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + d);
            gain2.gain.setValueAtTime(0.2 * fVol, now); gain2.gain.exponentialRampToValueAtTime(0.01, now + d);
            osc1.start(now); osc1.stop(now + d); osc2.start(now); osc2.stop(now + d);
        } 
        else if (type === 'death') {
            vibrate(50);
            const st = fxT(0.15), seg = fxT(0.15);
            for (let i = 0; i < 6; i++) {
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc1.type = 'square'; osc2.type = 'square';
                let f1 = 261.63 * Math.pow(2, -i/12); let f2 = 369.99 * Math.pow(2, -i/12);
                let t = now + (i * st);
                osc1.frequency.setValueAtTime(f1, t); osc2.frequency.setValueAtTime(f2, t);
                gain1.gain.setValueAtTime(0.15 * fVol, t); gain1.gain.linearRampToValueAtTime(0, t + seg);
                gain2.gain.setValueAtTime(0.15 * fVol, t); gain2.gain.linearRampToValueAtTime(0, t + seg);

            }
        }

            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'jump') { vibrate(15); const d = fxT(0.15); osc.type = 'triangle'; osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(450, now + d); gain.gain.setValueAtTime(0.08 * fVol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + d); osc.start(now); osc.stop(now + d); } 
            else if (type === 'shoot') { vibrate(20); const d = fxT(0.1); osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + d); gain.gain.setValueAtTime(0.05 * fVol, now); gain.gain.exponentialRampToValueAtTime(0.01, now + d); osc.start(now); osc.stop(now + d); } 
            else if (type === 'point') { const d = fxT(0.2); const d2 = fxT(0.1); osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(660, now + d2); gain.gain.setValueAtTime(0.08 * fVol, now); gain.gain.linearRampToValueAtTime(0, now + d); osc.start(now); osc.stop(now + d); } 
            else if (type === 'bossHit') { const d = fxT(0.3); osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(50, now + d); gain.gain.setValueAtTime(0.3 * fVol, now); gain.gain.linearRampToValueAtTime(0, now + d); osc.start(now); osc.stop(now + d); }

            else if (type === 'tempus') { const d = fxT(0.8); osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(220, now + d); gain.gain.setValueAtTime(0.15 * fVol, now); gain.gain.linearRampToValueAtTime(0, now + d); osc.start(now); osc.stop(now + d); } 
            else if (type === 'allaBreve') { const d = fxT(0.5); osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(1760, now + d); gain.gain.setValueAtTime(0.1 * fVol, now); gain.gain.linearRampToValueAtTime(0, now + d); osc.start(now); osc.stop(now + d); }

    function generateLevel(levelIndex, isEndless) {
        const platforms = [], enemies = [], flyingEnemies = [], jumpingFlats = [], fallingLongas = [];
        const items = [], scoreNotes = [], checkpoints = [], tempusItems = [], dashPads = [], inkPots = [], allaBreves = [];

            const types = ['BREVIS_REST', 'SEMIBREVIS_REST', 'MINIMA_REST'];
            const type = types[Math.floor(Math.random() * types.length)];

            if (gameMode !== 'GRADUS') {

                spaceY = spaces[Math.floor(Math.random() * spaces.length)];
            } else {
                spaceY = basePy - 30; // Approximation for gradus platforms
            }

                y = gameMode === 'GRADUS' ? basePy - 30 : spaceY;
                vIndex = 16;
            } else if (type === 'SEMIBREVIS_REST') {
                h = 15;
                y = gameMode === 'GRADUS' ? basePy - 30 : spaceY;
                vIndex = 8;
            } else if (type === 'MINIMA_REST') {
                h = 15;
                y = gameMode === 'GRADUS' ? basePy - 15 : spaceY + 15;
                mult = 1.4;
                vIndex = 4;
            }
            
            let spd = (gameMode === 'GRADUS' ? 1.5 : (1.5 + (levelIndex * 0.2))) * mult;

        };

        if (gameMode === 'GRADUS') {
            const length = 50000; let py = 350; let px = 400; platforms.push({ x: -1000, y: 350, w: 3000, h: 50, type: 'ground', shakeTimer: 0, falling: false });
            for(let i = 0; i < 2000; i++) {
                py -= 40 + Math.random() * 30; px += (Math.random() > 0.5 ? 1 : -1) * (60 + Math.random() * 80); 
                if (px < 50) px = 50 + Math.random()*50; if (px > 650) px = 650 - Math.random()*50;
                let pType = 'normal'; let r = Math.random();
                if (r > 0.8) pType = 'ice'; else if (r > 0.6) pType = 'descend'; else if (r > 0.4) pType = 'rising';
                
                let pw = 73 + Math.random() * 147;
                platforms.push({ x: px, y: py, w: pw, h: 20, type: pType, shakeTimer: 0, falling: false });
                
                if (Math.random() > 0.52) scoreNotes.push({ x: px + 30, y: py - 30, w: 15, h: 15, active: true });
                if (Math.random() > 0.86) enemies.push(createEnemy(px, px + 40, px, py));
                if (Math.random() > 0.93) jumpingFlats.push({ x: px + 20, baseY: py - 20, y: py - 20, w: 20, h: 30, state: 'idle', timer: Math.random() * 60, vy: 0, dead: false, damage: 4, valueIndex: 4, type: 'FLAT' });
                
                if (py > -48000 && (px - lastPowerupX > 800 || lastPowerupX - px > 800)) {
                    if (Math.random() > 0.95) { tempusItems.push({ x: px + pw/2, y: py - 50, w: 25, h: 25, active: true }); lastPowerupX = px; }

        }

        const length = isEndless ? 50000 : 8000 + (levelIndex * 2000); 
        let cx = 0;
        let gapChance = (levelIndex === 7) ? 0 : Math.min(0.1 + (levelIndex * 0.055), 0.48);
        let enemyChance = Math.min(0.16 + (levelIndex * 0.065), 0.52);
        let hazardChance = Math.min(levelIndex * 0.11, 0.46);

            checkpoints.push({ x: length * 0.33, w: 20, h: 150, active: true, label: "Clausula Media" }); checkpoints.push({ x: length * 0.66, w: 20, h: 150, active: true, label: "Clausula Tenoris" });

    }

    function takeDamage(amount = 2, killer = null, isHalving = false) { 
        let stateBeforeDamage = player.stateValue; 
        
        // Check if killed by bigger rest - FREEZE AT POINT OF IMPACT (no subtraction, no blood)
        let killerIsBiggerRest = killer && killer.type && killer.type.includes('REST') && killer.valueIndex !== undefined && killer.valueIndex > stateBeforeDamage;

        let pRect = { x: player.x + 2, y: player.y + 2, w: player.width - 4, h: player.height - 4 }; 
        let eW = (enemy.w !== undefined) ? enemy.w : (enemy.width || 20);
        let eH = (enemy.h !== undefined) ? enemy.h : (enemy.height || 30);
        let eRect = { x: enemy.x + 2, y: enemy.y + 2, w: eW - 4, h: eH - 4 };
        
        if (checkCollision(pRect, eRect)) {
            let buff = getPhysicsBuff(); let speedMult = speedSettings[difficultyIndex].mult;
            let isCentered = (player.x + player.width/2 > enemy.x - 15) && (player.x + player.width/2 < enemy.x + eW + 15);
            
            let isRest = enemy.type && enemy.type.includes('REST');
            let isStomp = isStompable && player.vy > 0 && (player.y + player.height - player.vy <= enemy.y + 20) && isCentered;

            checkList.forEach(e => { if (!e.dead && checkCollision({x:p.x, y:p.y, w:8, h:8}, e)) { e.dead = true; hit = true; playSound('smash'); spawnBlood(e.x, e.y); } });

                pathRoundRect(ctx, MENU_X, top, MENU_W, bh, R_IN);
                ctx.fill();
                
                ctx.strokeStyle = accent;
                ctx.lineWidth = 2;
                pathRoundRect(ctx, MENU_X, top, MENU_W, bh, R_IN);
                ctx.stroke();
                
                // Reset shadow so the text remains crisp
                ctx.shadowBlur = 0; 
                ctx.fillStyle = '#2a1810';
                ctx.font = '22px "Book Antiqua", Palatino, serif';
                ctx.textAlign = 'center';
                ctx.fillText(text, MENU_X + MENU_W / 2, top + 34);
                ctx.restore();
            };

            drawModeButton(118, 'Ars Antiqua (Classic)', undefined, undefined, true);
            drawModeButton(184, 'Ars Nova (Endless)');
            drawModeButton(250, 'Gradus ad Parnassum');
            drawModeButton(316, 'Magistri Mensurarum');

            if (isTouchDevice) {
                ctx.fillStyle = '#8b6914';
                ctx.font = 'italic 14px serif';
                ctx.fillText('Drag ● on this screen to place shoot before play.', 400, 332);
            }

            const credit = 'Feedback > mensuratorgame@gmail.com © Samuel Reid Navarro  ·  ' + new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            ctx.fillStyle = '#3d2914';
            ctx.font = 'italic 13px serif';
            ctx.fillText(credit, 200, 378);
            ctx.textAlign = 'center';
            return;
        }

        if (gameState === 'PLAY' || gameState === 'SPLASH' || gameState === 'DEATH_FREEZE' || gameState === 'WIN') {
            ctx.save(); ctx.translate(-cameraX, -cameraY); 
            ctx.strokeStyle = '#3a2518'; ctx.lineWidth = 2;
            if (gameMode !== 'GRADUS' && currentLevelData && currentLevelData.groundChunks) { 
                currentLevelData.groundChunks.forEach(chunk => { 
                    for (let i = 0; i < 5; i++) { 
                        ctx.beginPath(); 
                        ctx.moveTo(chunk.x, 230 + i * 30); 
                        ctx.lineTo(chunk.x + chunk.w, 230 + i * 30); 
                        ctx.stroke(); 
                    } 
                }); 
            } else if (gameMode === 'GRADUS') { 
                let startY = Math.floor(cameraY / 100) * 100; 
                for (let i = 0; i < 5; i++) { 
                    ctx.beginPath(); 
                    ctx.moveTo(100 + i * 150, startY - 1000); 
                    ctx.lineTo(100 + i * 150, cameraY + canvas.height + 1000); 
                    ctx.stroke(); 
                } 
            }

        if (gameMode === 'CLASSIC') {
            ctx.fillStyle = '#1a100a'; ctx.font = '70px serif'; ctx.fillText('𝄢', 20, 290); currentLevelData.checkpoints.forEach(cp => drawCheckpoint(ctx, cp));
if (!boss.active) { 
                ctx.fillStyle = '#8b6508'; 
                ctx.font = '60px serif'; 
                ctx.fillText('𝄡', currentLevelData.goal.x, 320); 
                
                // Add the "Finalis" label
                ctx.font = 'italic 22px "Book Antiqua", serif';
                ctx.fillText('Finalis', currentLevelData.goal.x - 15, 150);

                ctx.strokeStyle = 'rgba(139, 101, 8, 0.3)'; 
                ctx.lineWidth = 5; 
                ctx.beginPath(); 
                ctx.moveTo(currentLevelData.goal.x + 20, 0); 
                ctx.lineTo(currentLevelData.goal.x + 20, canvas.height); 
                ctx.stroke(); 
            }        }

        if (boss.active) {
            ctx.fillStyle = '#8b0000'; ctx.font = 'bold 60px serif'; ctx.fillText('♯ ♭', boss.x - 20, boss.y + 60);
            ctx.fillStyle = '#1a100a'; ctx.fillRect(boss.x - 20, boss.y - 20, 80, 8); ctx.fillStyle = '#8b0000'; ctx.fillRect(boss.x - 20, boss.y - 20, 80 * (boss.hp / boss.maxHp), 8);
            ctx.font = '16px serif'; ctx.fillText('MI-FA (Diabolus in Musica)', boss.x - 40, boss.y - 30);
            ctx.fillStyle = '#8b0000'; ctx.font = 'bold 24px serif'; boss.projectiles.forEach(bp => { ctx.fillText(Math.random() > 0.5 ? '♭' : '♯', bp.x, bp.y + 20); });
        }

        currentLevelData.walls.forEach(wall => { ctx.fillStyle = '#1a100a'; ctx.fillRect(wall.x, wall.y, wall.w, wall.h); });
        ctx.fillStyle = '#1a100a'; currentLevelData.fallingLongas.forEach(l => { 
            if (!l.dead) { 
                let lx = l.x; 
                if (l.state === 'shaking') lx += (Math.random() > 0.5 ? 2 : -2); 
                
                ctx.fillStyle = (l.state === 'shaking' || l.state === 'falling') ? '#ff0000' : '#8b0000';
                const width = 12; 
                const centerX = lx; 
                
                ctx.fillRect(centerX, l.y, width, 60); 
            } 
        });
        currentLevelData.platforms.forEach(plat => drawLigature(ctx, plat));

        ctx.fillStyle = '#1a100a'; currentLevelData.scoreNotes.forEach(note => { if (note.active) drawDiamond(ctx, note.x + 7, note.y + 7, 8, true); });
        
        ctx.fillStyle = '#00008b'; ctx.font = 'bold 36px serif'; 
        currentLevelData.allaBreves.forEach(item => { 
            if (item.active) {
                ctx.fillText('C', item.x - 5, item.y + 35); 
                ctx.fillRect(item.x - 5, item.y + 3, 3, 40); 
            } 
        });

        ctx.fillStyle = '#1a100a'; ctx.font = 'bold 24px sans-serif'; currentLevelData.tempusItems.forEach(item => { if (item.active) ctx.fillText('◯', item.x, item.y + 20); });
        ctx.fillStyle = '#000'; currentLevelData.inkPots.forEach(pot => { if (pot.active) { ctx.beginPath(); ctx.arc(pot.x + 10, pot.y + 15, 10, 0, Math.PI*2); ctx.fill(); ctx.fillRect(pot.x + 5, pot.y, 10, 10); } });

        currentLevelData.enemies.forEach(e => { if(!e.dead) { ctx.fillStyle = e.aggro ? '#ff0000' : '#8b0000'; ctx.fillRect(e.x, e.y, e.w, e.h); } }); 
        ctx.fillStyle = '#b30000'; ctx.font = 'bold 30px serif'; currentLevelData.jumpingFlats.forEach(flat => { if (!flat.dead && flat.state !== 'hidden') ctx.fillText('♭', flat.x, flat.y + 25); });
        ctx.fillStyle = '#8b0000'; ctx.font = 'bold 40px serif'; currentLevelData.flyingEnemies.forEach(e => { if(!e.dead) ctx.fillText('♯', e.x, e.y + 35); });
        ctx.fillStyle = '#1a100a'; projectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill(); });
        
        if (gameMode === 'ENDLESS') { ctx.fillStyle = 'rgba(26, 16, 10, 0.95)'; ctx.fillRect(cameraX - 1000, -500, 1000 - 24, canvas.height + 1000); } 
        else if (gameMode === 'GRADUS') { ctx.fillStyle = 'rgba(26, 16, 10, 0.95)'; ctx.fillRect(-1000, cameraY + canvas.height + 24, canvas.width + 2000, 1000); }

        if (currentLevelData.hasFuga && player.history.length === 60) { let ghost = player.history[0]; drawMensuralNote(ctx, ghost.x, ghost.y, noteStates[ghost.state], false, 0.6, false, true); }

        const isColored = player.colorationTimer > 0;
        trail.forEach((t, i) => drawMensuralNote(ctx, t.x, t.y, noteStates[t.state], false, (i+1)/10, isColored));
        drawMensuralNote(ctx, player.x, player.y, noteStates[getStateIndex(player.stateValue)], player.invulnerableTimer > 0, 1, isColored);

        particles.forEach(p => { ctx.fillStyle = p.color || 'rgba(100, 80, 60, 0.6)'; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill(); });
        ctx.restore(); 

        if (gameState === 'SPLASH') {
            ctx.fillStyle = 'rgba(26, 16, 10, 0.95)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            ctx.fillStyle = '#b8860b'; ctx.font = 'bold 40px "Book Antiqua", serif';
            const titleSplash = modesData[currentLevel].name;
            ctx.fillText(titleSplash, canvas.width / 2, 100);
            
            ctx.fillStyle = '#d4c3a3'; ctx.font = 'italic 18px "Book Antiqua", serif';
            const quoteSplash = modesData[currentLevel].quote;
            const quoteParts = quoteSplash.split(' - ');
            const quoteBody = quoteParts[0];
            const quoteAuthor = quoteParts.length > 1 ? quoteParts[1] : '';
            const maxWidth = 750;
            const quoteWords = quoteBody.split(' ');
            let quoteLines = [];
            let quoteLine = '';
            for (let word of quoteWords) {
                const test = quoteLine + (quoteLine ? ' ' : '') + word;
                if (ctx.measureText(test).width > maxWidth && quoteLine) {
                    quoteLines.push(quoteLine);
                    quoteLine = word;
                } else {
                    quoteLine = test;
                }
            }
            if (quoteLine) quoteLines.push(quoteLine);
            let qy = 160;
            for (let ql of quoteLines) {
                ctx.fillText(ql, canvas.width / 2, qy);
                qy += 20;
            }
            if (quoteAuthor) {
                ctx.font = 'italic 14px "Book Antiqua", serif';
                ctx.fillText('- ' + quoteAuthor, canvas.width / 2, qy + 5);
            }
            
            ctx.fillStyle = `rgba(184, 134, 11, ${0.5 + Math.sin(Date.now() / 300) * 0.5})`;
            ctx.font = 'bold 20px sans-serif';
            ctx.fillText('Press any key or tap to continue', canvas.width / 2, canvas.height - 40);
        } else if (gameState !== 'DEATH_FREEZE' && gameState !== 'WIN' && gameState !== 'MENU' && gameState !== 'PAUSE') {
            if (currentLevel === 0 && gameMode === 'CLASSIC') {
                ctx.save();
                
                // Add control hints at the start of the level
                if (player.x < 1000) {
                    ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 400) * 0.3;
                    ctx.fillStyle = '#b8860b';
                    ctx.font = 'bold 60px "Book Antiqua", serif';
                    ctx.textAlign = 'center';
                    
                    if (isTouchDevice) {
                        // Mobile controls hint
                        ctx.fillText('Controls down below', canvas.width / 2, 120);
                        ctx.font = 'bold 30px sans-serif';
                        ctx.fillText('↓', canvas.width / 2, 160);
                    } else {
                        // Desktop controls hint
                        ctx.fillText('Controls: WASD or ← → ↑', canvas.width / 2, 120);
                        ctx.font = 'bold 300px sans-serif';
                    }
                    ctx.textAlign = 'left';
                }
                if (player.x > 2800 && player.x < 32000) {
                    ctx.globalAlpha = 0.7 + Math.sin(Date.now() / 450) * 0.3;
                    ctx.fillStyle = '#b8860b';
                    ctx.font = 'bold 40px sans-serif';
                    ctx.fillText('↠', 380, 150);
                    ctx.globalAlpha = 0.8;
                    ctx.font = 'bold 25px "Book Antiqua", serif';
                    ctx.fillText('Double tap to run!', 400, 190);
                }
                
                ctx.restore();
            }
        } 
            
            if (gameMode === 'CLASSIC') { let progress = player.x / currentLevelData.goal.x; if (progress > 1) progress = 1; ctx.fillStyle = 'rgba(58, 37, 24, 0.28)'; ctx.fillRect(0, canvas.height - 10, canvas.width, 10); ctx.fillStyle = '#b8860b'; ctx.fillRect(0, canvas.height - 10, canvas.width * progress, 10); }
            
            ctx.textAlign = 'left';
            ctx.fillStyle = '#1a100a';
            ctx.font = 'bold 28px "Book Antiqua", serif';
            const modeLabel = modesData[currentLevel].name.split(':')[0];
            ctx.fillText(modeLabel, 28, 35);
            
            ctx.fillStyle = '#1a100a';
            ctx.font = 'bold 28px "Book Antiqua", serif';
            ctx.fillText(modesData[currentLevel].modeName, 28, 58);

            const maxQuoteWidth = 420;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#1a100a';
            ctx.font = 'italic 24px "Book Antiqua", serif';
            const quoteText = modesData[currentLevel].quote;
            
            const lastDashIndex = quoteText.lastIndexOf(' - ');
            const quoteBody = quoteText.substring(0, lastDashIndex);
            const author = quoteText.substring(lastDashIndex + 3);
            
            const words = quoteBody.split(' ');
            let lines = [];
            let currentLine = '';
            for (let word of words) {
                const testLine = currentLine + (currentLine ? ' ' : '') + word;
                if (ctx.measureText(testLine).width > maxQuoteWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) lines.push(currentLine);
            
            const lineHeight = 18;
            const totalHeight = lines.length * lineHeight + 20;
            let startY = 22 + (70 - totalHeight) / 2;
            for (let line of lines) {
                ctx.fillText(line, canvas.width / 2, startY);
                startY += lineHeight;
            }
            ctx.font = 'italic 21px "Book Antiqua", serif';
            ctx.fillText('- ' + author, canvas.width / 2, startY + 5);

            ctx.textAlign = 'right';
            const mins = Math.floor(levelTime / 60), secs = Math.floor(levelTime % 60);
            ctx.fillStyle = '#1a100a';
            ctx.font = 'bold 28px "Book Antiqua", serif';
            ctx.fillText(mins + ':' + secs.toString().padStart(2, '0'), canvas.width - 28, 35);
            
            ctx.fillStyle = '#1a100a';
            ctx.font = 'bold 22px "Book Antiqua", serif';
            ctx.fillText('Puncta: ' + player.score, canvas.width - 28, 58);

            ctx.textAlign = 'right';
            let statusY = 85;
            if (player.tempusTimer > 0) { ctx.fillStyle = '#1a100a'; ctx.font = 'bold 22px "Book Antiqua", serif'; ctx.fillText('Tempus Perfectum!', canvas.width - 28, statusY); statusY += 25; }
            if (player.allaBreveTimer > 0) { ctx.fillStyle = '#00008b'; ctx.font = 'bold 22px "Book Antiqua", serif'; ctx.fillText('Proportio Dupla!', canvas.width - 28, statusY); statusY += 25; }
            if (player.colorationTimer > 0) { ctx.fillStyle = '#1a100a'; ctx.font = 'bold 22px "Book Antiqua", serif'; ctx.fillText('Coloratio!', canvas.width - 28, statusY); statusY += 25; }
            if (currentLevelData.hasFuga && player.history.length === 60) { ctx.fillStyle = '#cc0000'; ctx.font = 'bold 20px "Book Antiqua", serif'; ctx.fillText('Fuga: Canon pursues!', canvas.width - 28, statusY); statusY += 25; }
            if (boss.active) { 
                // Existing warning
                ctx.fillStyle = '#8b0000'; 
                ctx.font = 'bold 22px "Book Antiqua", serif'; 
                ctx.fillText('CAVE DIABOLUM!', canvas.width - 28, statusY); 
                
                // New blinking shoot instruction
                ctx.textAlign = 'center';
                ctx.font = 'bold 36px "Book Antiqua", serif';
                if (Math.floor(Date.now() / 400) % 2 === 0) { // Blinks every 400ms
                    ctx.fillText(isTouchDevice ? 'SHOOT!' : 'SHOOT WITH SPACEBAR!', canvas.width / 2, 120);
                }
            }

            if (!isTouchDevice) {
                ctx.fillStyle = '#1a100a';
                ctx.font = '14px "Book Antiqua", serif';
                ctx.textAlign = 'center';
                ctx.fillText('< > = Run/Sprint | ^ = Jump | SPACE = Shoot | ESC = Pause', canvas.width / 2, canvas.height - 8);
            }
        }

        if (gameState === 'DEATH_FREEZE') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff1111'; 
            ctx.font = 'bold 56px "Book Antiqua", serif';
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#1a100a';
            ctx.strokeText('CANTUS INTERRUPTUS', canvas.width / 2, canvas.height / 2 + 10);
            ctx.fillText('CANTUS INTERRUPTUS', canvas.width / 2, canvas.height / 2 + 10);
            
            ctx.fillStyle = '#d4c3a3'; 
            ctx.font = 'bold 18px serif'; 
            ctx.fillText('Press any key or tap to continue', canvas.width / 2, canvas.height / 2 + 60);
            
            if (gameMode === 'ENDLESS' || gameMode === 'GRADUS') {
                ctx.fillText(`Spatium Ultimatum: ${endlessDistance}`, canvas.width / 2, canvas.height / 2 + 90);
            }
        }

        if (gameState === 'NAME_INPUT') {
            drawNameInput();
        } else if (gameState === 'LEADERBOARD') {
            drawLeaderboard();
        }
    }

    function loop(now) { 
        if (typeof now !== 'number') now = performance.now();
        let dt = now - lastTime;
        if (dt > 250) dt = 250; 
        lastTime = now;
        accumulator += dt;
        while (accumulator >= FIXED_DT_MS) {
            if (gameState === 'PLAY') levelTime += (FIXED_DT_MS / 1000) * speedSettings[difficultyIndex].mult;
            update();
            accumulator -= FIXED_DT_MS;
        }
        draw();
        requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
